# GitHub Pages (Jekyll) configuration
# Builds this repo into a website at:  https://<username>.github.io/<repo-name>/

title: "EEE 303 — Digital System Design (VeriSim)"
description: "A 14-week Verilog HDL course with the browser-based VeriSim simulator and the Tang Nano 9K FPGA. Şenol Gülgönül, Ostim Technical University."
theme: jekyll-theme-cayman

# README.md is used as the site home page.
# Relative links between .md files resolve automatically on GitHub Pages
# (the jekyll-relative-links plugin is enabled by default).

# Don't publish scratch/working files if any are ever added here:
exclude:
  - "*.v"
  - "*.vcd"
  - "/tmp"
